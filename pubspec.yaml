name: libri_stack
description: LibriStack Books Database Frontend
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.5
  go_router: ^7.1.1
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  dio: ^5.4.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  cached_network_image: ^3.4.1
  flutter_blurhash: ^0.8.2
  photo_view: ^0.15.0
  shared_preferences: ^2.5.4
  fl_chart: ^0.66.0
  sliver_tools: ^0.2.10
  flutter_markdown: ^0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/covers/
